# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - gbb-marketing-studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: live
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # NEXT_PUBLIC_* vars must be present at build time — they are embedded
      # in the client bundle by Next.js and cannot be changed at runtime.
      # Update NEXT_PUBLIC_APP_URL if the App Service hostname ever changes.
      # Set NEXT_PUBLIC_AUTH and NEXT_PUBLIC_AUTH_URL as GitHub Actions variables
      # (Settings → Variables) to override the defaults below.
      - name: Install and build frontend
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_AUTH: ${{ vars.NEXT_PUBLIC_AUTH || 'true' }}
          NEXT_PUBLIC_AUTH_URL: ${{ vars.NEXT_PUBLIC_AUTH_URL }}
        run: |
          cd frontend
          npm ci
          npm run build

      # The Next.js standalone build omits static assets and public dir.
      # Copy them into the standalone root alongside the guidelines used by API routes.
      - name: Prepare standalone frontend assets
        run: |
          cp -r frontend/.next/static   frontend/.next/standalone/.next/static
          cp -r frontend/public         frontend/.next/standalone/public
          cp -r frontend/guidelines     frontend/.next/standalone/guidelines

      - name: Install backend production dependencies
        run: cd backend && npm ci --omit=dev

      # Assemble a lean deployment package:
      #   frontend/  →  Next.js standalone (server.js + node_modules + assets)
      #   backend/   →  Express app + production node_modules
      #   startup.sh →  Azure App Service startup command
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/frontend deploy/backend
          cp -r frontend/.next/standalone/. deploy/frontend/
          cp -r backend/.                   deploy/backend/
          cp startup.sh                     deploy/startup.sh

      - name: Zip deployment package
        run: cd deploy && zip -r ../app.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9788D524121A4F8FA82AE84CFE6B57EA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AAEAC90998704AA7842AA829D40F4ED9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7CE5A4691DCD4208993913F9623DAAC2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gbb-marketing-studio'
          slot-name: 'Production'
          package: app.zip
          startup-command: 'bash /home/site/wwwroot/startup.sh'
          